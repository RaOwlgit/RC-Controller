<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-widthdiv, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: orange;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .model-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        model-viewer {
            height: 250px;
            width: 250px;
        }
    </style>
</head>
<body>

<div class="model-container">
    <model-viewer id="plane"
        alt="3d model"
        src="plane.glb"
        autoplay 
        touch-action="pan-y"
        disable-zoom
        camera-orbit="25deg 75deg 105%"
        min-camera-orbit="auto 75deg auto"
        max-camera-orbit="auto 75deg auto">   
    </model-viewer>
</div>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

<script>
const viewer = document.getElementById("plane");

let smoothX = 0;

// ask permission on first tap (important for mobile)
window.addEventListener("click", async () => {

    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== "granted") return;
        } catch(e) {
            return;
        }
    }

    startGyro();
}, { once: true });

function startGyro(){

    window.addEventListener("deviceorientation", (event) => {

        let tiltX = event.gamma || 0; // LEFT / RIGHT

        // smooth motion
        smoothX = smoothX * 0.9 + tiltX * 0.1;

        // limit tilt
        let rotY = Math.max(-50, Math.min(50, smoothX));

        // 🎯 apply tilt (left/right)
        viewer.cameraOrbit = `${20 + rotY}deg 75deg 105%`;

    });
}
</script>

</body>
</html>
