<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plane Gyro Tilt</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: orange;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.model-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px;
}

/* ✅ plane size same */
model-viewer {
    height: 250px;
    width: 250px;
    transition: transform 0.1s linear; /* smooth tilt */
}
</style>
</head>

<body>

<div class="model-container">
    <model-viewer id="plane"
        src="plane.glb"
        autoplay
        disable-zoom
        camera-controls="false"
        touch-action="none">
    </model-viewer>
</div>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

<script>
const plane = document.getElementById("plane");

let smoothX = 0;

// auto start (no button)
if (typeof DeviceOrientationEvent.requestPermission === "function") {
    document.body.addEventListener("click", async () => {
        await DeviceOrientationEvent.requestPermission();
    }, { once: true });
}

window.addEventListener("deviceorientation", (event) => {

    let tiltX = event.gamma || 0;

    // smooth like your ball code
    smoothX = smoothX * 0.9 + tiltX * 0.1;

    // limit tilt
    let roll = Math.max(-45, Math.min(45, smoothX));

    // ✈️ REAL TILT (rotate Z like aircraft roll)
    plane.style.transform = `rotateZ(${roll}deg)`;

});
</script>

</body>
</html>
