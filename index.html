<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plane Gyro Tilt</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background-color: orange;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}
.model-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 50px;
    perspective: 800px;
}
model-viewer {
    height: 250px;
    width: 250px;
    transition: transform 0.1s linear;
    pointer-events: none;
}
</style>
</head>
<body>
<div class="model-container">
   <model-viewer id="plane"
        src="plane.glb"
        autoplay
        disable-zoom
        camera-controls="false"
        touch-action="none"
        camera-orbit="0deg 75deg 105%"   
        min-camera-orbit="40deg 75deg 105%"
        max-camera-orbit="40deg 80deg 105%">
    </model-viewer>
</div>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
<script>
const plane = document.getElementById("plane");
let smoothX = 0;

// iPhone permission
if (typeof DeviceOrientationEvent.requestPermission === "function") {
    document.body.addEventListener("click", async () => {
        await DeviceOrientationEvent.requestPermission();
    }, { once: true });
}

window.addEventListener("deviceorientation", (event) => {
    let tiltX = event.gamma || 0; // left/right tilt

    // smooth
    smoothX = smoothX * 0.9 + tiltX * 0.1;

    // limit tilt
    let bank = Math.max(-40, Math.min(40, smoothX));

    // ✈️ rotateZ = banking/rolling (wing up/down) — NOT rotateY (that spins!)
    plane.style.transform = `
        rotateZ(${-bank}deg)
        rotateX(5deg)
    `;
});
</script>
</body>
</html>
